<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinSnap - Premium Pinterest Downloader</title>
    
    <!-- Fonts & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- React & Babel for Single File Execution -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            margin: 0;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(to right, #818cf8, #ffffff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- UI Components ---

        const Icon = ({ name, className }) => {
            const [icon, setIcon] = useState(null);
            useEffect(() => {
                if (window.lucide) {
                    const iconElement = window.lucide.icons[name];
                    if (iconElement) setIcon(name);
                }
            }, [name]);
            
            return <i data-lucide={name} className={className}></i>;
        };

        const FeatureCard = ({ icon, title, desc }) => (
            <div className="p-8 rounded-3xl border border-white/5 bg-slate-900/40 hover:bg-slate-900/60 transition-all group">
                <div className="w-12 h-12 rounded-2xl bg-indigo-500/10 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
                    <Icon name={icon} className="text-indigo-400 w-6 h-6" />
                </div>
                <h3 className="text-xl font-bold text-white mb-3">{title}</h3>
                <p className="text-slate-400 text-sm leading-relaxed">{desc}</p>
            </div>
        );

        const App = () => {
            const [url, setUrl] = useState('');
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [loading, data]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!url) return;
                setLoading(true);
                setData(null);
                
                // Simulating API Fetch
                setTimeout(() => {
                    setLoading(false);
                    setData({
                        title: "Professional Cinematic Edit",
                        thumbnail: "https://images.unsplash.com/photo-1611162617474-5b21e879e113?q=80&w=800&auto=format&fit=crop",
                        duration: "0:30"
                    });
                }, 2000);
            };

            return (
                <div className="min-h-screen relative">
                    {/* Background Glows */}
                    <div className="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-indigo-600/10 rounded-full blur-[120px] pointer-events-none"></div>
                    <div className="fixed bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-purple-600/10 rounded-full blur-[120px] pointer-events-none"></div>

                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 border-b border-white/5 glass">
                        <div className="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-indigo-600 p-1.5 rounded-lg"><Icon name="video" className="text-white w-5 h-5" /></div>
                                <span className="text-xl font-bold text-white">PinSnap</span>
                            </div>
                            <div className="hidden md:flex gap-8 text-sm font-medium text-slate-400">
                                <a href="#" className="hover:text-white transition-colors">How to Use</a>
                                <a href="#" className="hover:text-white transition-colors">API</a>
                                <a href="#" className="hover:text-white transition-colors">Contact</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <main className="pt-32 pb-20 px-6 max-w-5xl mx-auto text-center">
                        <div className="space-y-6 mb-12 animate-in fade-in duration-1000">
                            <h1 className="text-5xl md:text-7xl font-extrabold tracking-tight leading-tight">
                                Pinterest Videos <br />
                                <span className="gradient-text">In One Click.</span>
                            </h1>
                            <p className="text-slate-400 text-lg md:text-xl max-w-2xl mx-auto">
                                Paste your link below to download high-quality videos without any watermark. Fast, free, and secure.
                            </p>
                        </div>

                        {/* Search Bar */}
                        <div className="max-w-2xl mx-auto relative group">
                            <form onSubmit={handleSubmit} className="relative flex items-center">
                                <input 
                                    type="text" 
                                    placeholder="Paste Pinterest link here..."
                                    className="w-full bg-slate-900/50 border border-slate-800 rounded-3xl py-6 pl-14 pr-40 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all text-lg"
                                    value={url}
                                    onChange={(e) => setUrl(e.target.value)}
                                />
                                <div className="absolute left-5 text-slate-500"><Icon name="search" className="w-6 h-6" /></div>
                                <button className="absolute right-3 bg-white hover:bg-slate-200 text-slate-950 px-8 py-3.5 rounded-2xl font-bold flex items-center gap-2 transition-all active:scale-95">
                                    {loading ? <Icon name="loader-2" className="w-5 h-5 animate-spin" /> : <><Icon name="download" className="w-5 h-5" /> Download</>}
                                </button>
                            </form>
                        </div>

                        {/* Result Card */}
                        {data && (
                            <div className="mt-12 max-w-2xl mx-auto glass p-8 rounded-[40px] animate-in slide-in-from-bottom-10 duration-500">
                                <div className="flex flex-col md:flex-row gap-8">
                                    <div className="relative w-full md:w-48 aspect-[9/16] rounded-2xl overflow-hidden shadow-2xl">
                                        <img src={data.thumbnail} className="w-full h-full object-cover" />
                                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                        <div className="absolute bottom-3 left-4 text-xs font-bold text-white uppercase tracking-widest">{data.duration}</div>
                                    </div>
                                    <div className="flex-1 text-left flex flex-col justify-between">
                                        <div>
                                            <h3 className="text-2xl font-bold text-white mb-2">{data.title}</h3>
                                            <div className="flex items-center gap-2 text-indigo-400 text-sm font-medium">
                                                <Icon name="check-circle-2" className="w-4 h-4" /> Ready to download
                                            </div>
                                        </div>
                                        <div className="space-y-3 mt-8">
                                            <button className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold flex items-center justify-center gap-3 transition-all shadow-lg shadow-indigo-600/20">
                                                <Icon name="download" className="w-5 h-5" /> Download MP4 (HD)
                                            </button>
                                            <button className="w-full py-4 bg-white/5 hover:bg-white/10 text-white border border-white/10 rounded-2xl font-bold transition-all">
                                                Download Thumbnail
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Features Grid */}
                        <div className="mt-40 grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
                            <FeatureCard icon="zap" title="Super Fast" desc="Our servers fetch video metadata in milliseconds for an instant experience." />
                            <FeatureCard icon="smartphone" title="Mobile First" desc="Designed to work perfectly on your iPhone or Android devices." />
                            <FeatureCard icon="lock" title="Private" desc="We don't log your downloads. Your privacy is our number one priority." />
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="py-20 border-t border-white/5 text-center">
                        <div className="flex justify-center gap-6 mb-8 text-slate-500">
                            <Icon name="github" className="w-6 h-6 cursor-pointer hover:text-white transition-colors" />
                            <Icon name="instagram" className="w-6 h-6 cursor-pointer hover:text-white transition-colors" />
                        </div>
                        <p className="text-slate-600 text-sm mb-4">© 2024 PinSnap - Not affiliated with Pinterest.</p>
                        <div className="inline-block px-4 py-1.5 rounded-full bg-white/5 border border-white/10">
                            <p className="text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">
                                Built with ❤️ by <span className="text-indigo-400">@Editbyujjwal</span>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
